<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Password Reset Successful</title>
  </head>
  <body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #eaf6ef">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#eaf6ef">
      <tr>
        <td align="center">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            border="0"
            bgcolor="#ffffff"
            style="border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1)"
          >
            <!-- Header -->
            <tr>
              <td align="center" bgcolor="#0f503f" style="padding: 20px">
                <h1 style="color: #ffffff; margin: 0; font-size: 22px">
                  Password Reset Successful
                </h1>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding: 30px; color: #333333; font-size: 16px; line-height: 1.6">
                <p>Hi <strong>{{email}}</strong>,</p>
                <p>
                  Your password has been successfully reset. If this was you, no further action is
                  needed.
                </p>
                <p>
                  If you did not perform this action, please contact our support team immediately.
                </p>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                align="center"
                bgcolor="#f7f7f7"
                style="padding: 15px; font-size: 13px; color: #777"
              >
                <p style="margin: 0">&copy; {{year}} TrackWeNg. All rights reserved.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
