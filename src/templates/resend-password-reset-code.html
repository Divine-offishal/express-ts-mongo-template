<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Resend Verification Code</title>
  </head>
  <body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f6f9fc">
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      width="100%"
      style="background-color: #f6f9fc; padding: 40px 0"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            width="600"
            style="
              background-color: #ffffff;
              border-radius: 8px;
              box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
              overflow: hidden;
            "
          >
            <!-- Header -->
            <tr>
              <td
                align="center"
                style="
                  background-color: #0f503f;
                  color: #ffffff;
                  padding: 20px;
                  font-size: 20px;
                  font-weight: bold;
                "
              >
                TrackWeNg
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding: 30px; color: #333333; font-size: 15px; line-height: 1.6">
                <p>Hi {{email}},</p>

                <p>
                  You requested to resend your verification code. Please use the code below to
                  verify your account:
                </p>

                <p
                  style="
                    font-size: 24px;
                    font-weight: bold;
                    color: #0f503f;
                    text-align: center;
                    letter-spacing: 4px;
                    margin: 30px 0;
                  "
                >
                  {{code}}
                </p>

                <p>If you did not request this, you can safely ignore this email.</p>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                align="center"
                style="background-color: #f1f1f1; padding: 20px; font-size: 12px; color: #888888"
              >
                &copy; {{year}} TrackWeNg. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
